  <line x1="30" y1="80" x2="46" y2="80" stroke="#d4a0b9" stroke-width="1" stroke-linecap="round"/>
  <line x1="82" y1="76" x2="98" y2="74" stroke="#d4a0b9" stroke-width="1" stroke-linecap="round"/>
  <line x1="82" y1="80" x2="98" y2="80" stroke="#d4a0b9" stroke-width="1" stroke-linecap="round"/>
</svg>
