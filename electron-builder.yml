appId: net.arkjp.nyandeck
productName: nyandeck
copyright: Copyright (c) 2026 nekonoverse

directories:
  output: electron-dist
  buildResources: build

files:
  - dist/**/*
  - electron/main.js
  - "!node_modules/**/*"
  - "!CLAUDE.md"
  - "!claude-md"
  - "!.nekonoverse"

extraMetadata:
  main: electron/main.js

asar: true

mac:
  category: public.app-category.social-networking
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Network
  icon: build/icon.png
  desktop:
    entry:
      Name: nyandeck
      Comment: Deck-style client for Nekonoverse
      Categories: Network;InstantMessaging;

publish: null
